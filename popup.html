<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments Sidebar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap');

        :root {
            --bg-color: #09090b;
            --surface: rgba(24, 24, 27, 0.7);
            --border: rgba(63, 63, 70, 0.5);
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 320px;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            position: relative;
            overflow: hidden;
        }

        /* Animated Background Gradients */
        .bg-blob-1 {
            position: absolute;
            top: -50px;
            left: -50px;
            width: 150px;
            height: 150px;
            background: var(--primary);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.3;
            z-index: -1;
            animation: pulse 6s infinite alternate;
        }

        .bg-blob-2 {
            position: absolute;
            bottom: -50px;
            right: -50px;
            width: 120px;
            height: 120px;
            background: #ec4899;
            border-radius: 50%;
            filter: blur(50px);
            opacity: 0.2;
            z-index: -1;
            animation: pulse 8s infinite alternate-reverse;
        }

        @keyframes pulse {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.2) translate(20px, 20px); }
        }

        .container {
            padding: 24px;
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 0;
            height: 100%;
        }

        header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .logo-container {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), #ec4899);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .logo-container svg {
            width: 24px;
            height: 24px;
            fill: #fff;
        }

        .title-group h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 2px;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title-group p {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .status-card {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            transition: all 0.3s ease;
        }

        .status-card:hover {
            box-shadow: 0 0 20px var(--success-glow);
            transform: translateY(-2px);
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            background-color: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success);
            position: relative;
        }

        .status-indicator::after {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            background-color: var(--success);
            border-radius: 50%;
            opacity: 0.4;
            animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        @keyframes ping {
            75%, 100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        .status-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--success);
        }

        .info-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
        }

        .info-section h3 {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-section p {
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-muted);
        }

        /* Inactive State Classes */
        .status-card.inactive {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .status-card.inactive:hover {
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
        }

        .status-card.inactive .status-indicator {
            background-color: #ef4444;
            box-shadow: 0 0 10px #ef4444;
        }

        .status-card.inactive .status-indicator::after {
            background-color: #ef4444;
            animation: none;
        }

        .status-card.inactive .status-text {
            color: #ef4444;
        }
    </style>
</head>
<body>
    <div class="bg-blob-1"></div>
    <div class="bg-blob-2"></div>
    
    <div class="container">
        <header>
            <div class="logo-container">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2ZM20 16H5.17L4 17.17V4H20V16ZM7 9H17V11H7V9ZM7 12H14V14H7V12ZM7 6H17V8H7V6Z" />
                </svg>
            </div>
            <div class="title-group">
                <h1>Sidebar for YT</h1>
                <p>Comments made better</p>
            </div>
        </header>

        <div class="status-card" id="status-card">
            <div class="status-indicator" id="status-indicator"></div>
            <div class="status-text" id="status-text">Extension Active</div>
        </div>

        <div class="info-section">
            <h3>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="16" x2="12" y2="12"></line>
                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
                How it works
            </h3>
            <p>Open any YouTube video and the comments will automatically appear in a sleek sidebar next to the player.</p>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
